name: Bug report
description: Report a reproducible bug in VibeCanvas.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve VibeCanvas.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node.js version, and package manager.
      placeholder: macOS 15, Chrome 123, Node 20, npm
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that reproduces the issue.
      placeholder: |
        1. Open the app
        2. Enter a prompt
        3. Click generate
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or logs
      description: Add screenshots, console errors, or relevant logs.
